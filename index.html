<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book of Dreams — Roni Nash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow-x:hidden;}

#hero{
  position:relative;
  width:100%;
  height:100vh;
  min-height:600px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

#nebula-photo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  z-index:0;
  opacity:0.75;
}

#dream-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  pointer-events:none;
  mix-blend-mode:screen;
}

#vignette{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at center, transparent 28%, rgba(0,0,0,0.62) 100%);
  z-index:2;
}

#bottom-fade{
  position:absolute;
  bottom:0;left:0;right:0;
  height:140px;
  background:linear-gradient(to bottom,transparent,rgba(0,0,0,0.55));
  z-index:3;
}

#hero-content{
  position:relative;
  z-index:4;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 24px;
  gap:16px;
}

.byline{
  font-family:'Georgia','Times New Roman',serif;
  font-size:11px;
  font-weight:400;
  letter-spacing:0.30em;
  text-transform:uppercase;
  color:rgba(245,200,66,0.6);
  margin:0;
  padding:5px 20px;
  border:0.5px solid rgba(245,168,0,0.28);
  border-radius:20px;
}

.hero-title{
  font-family:'Georgia','Times New Roman',serif;
  font-size:clamp(44px,9vw,92px);
  font-weight:400;
  letter-spacing:0.07em;
  text-transform:uppercase;
  color:#f5c842;
  margin:0;
  line-height:1.0;
  animation:title-breathe 6s ease-in-out infinite;
}

.hero-sub{
  font-family:'Georgia','Times New Roman',serif;
  font-size:12px;
  font-weight:400;
  letter-spacing:0.26em;
  text-transform:uppercase;
  color:rgba(245,168,0,0.42);
  margin:0;
}

#scroll-cta{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:5;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
  animation:scroll-bob 3s ease-in-out infinite;
}

#scroll-cta p{
  font-family:'Georgia',serif;
  font-size:10px;
  letter-spacing:0.24em;
  text-transform:uppercase;
  color:rgba(245,168,0,0.38);
  margin:0;
}

@keyframes title-breathe{
  0%,100%{text-shadow:0 0 60px rgba(245,168,0,0.32),0 0 120px rgba(245,168,0,0.12);}
  50%{text-shadow:0 0 90px rgba(245,168,0,0.58),0 0 180px rgba(245,168,0,0.22);}
}

@keyframes scroll-bob{
  0%,100%{opacity:1;transform:translateX(-50%) translateY(0);}
  50%{opacity:0.4;transform:translateX(-50%) translateY(7px);}
}

@keyframes pulse-ring{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.55;}
  50%{transform:translate(-50%,-50%) scale(1.07);opacity:0.15;}
}

@keyframes pulse-ring-2{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.35;}
  50%{transform:translate(-50%,-50%) scale(1.09);opacity:0.1;}
}

.pulse-r1{
  position:absolute;
  width:38vw;height:38vw;
  max-width:500px;max-height:500px;
  min-width:300px;min-height:300px;
  border-radius:50%;
  border:1px solid rgba(245,168,0,0.2);
  top:50%;left:50%;
  z-index:2;
  animation:pulse-ring 5s ease-in-out infinite;
}
.pulse-r2{
  position:absolute;
  width:28vw;height:28vw;
  max-width:380px;max-height:380px;
  min-width:220px;min-height:220px;
  border-radius:50%;
  border:0.5px solid rgba(245,168,0,0.12);
  top:50%;left:50%;
  z-index:2;
  animation:pulse-ring-2 5s ease-in-out infinite 1.8s;
}
</style>
</head>

  <canvas id="dream-canvas"></canvas>

  <div class="pulse-r1"></div>
  <div class="pulse-r2"></div>

  <div id="vignette"></div>
  <div id="bottom-fade"></div>

  <div id="hero-content">
    <p class="byline">Roni Nash</p>
    <h1 class="hero-title">Book of Dreams</h1>
    <p class="hero-sub">A Transmedia Saga</p>
  </div>

  <div id="scroll-cta">
    <p>Enter</p>
    <svg width="14" height="22" viewBox="0 0 14 22" fill="none">
      <path d="M7 1 L7 17 M1 13 L7 19 L13 13" stroke="rgba(245,168,0,0.38)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

</section>

<script>
const canvas = document.getElementById('dream-canvas');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const cx = () => canvas.width / 2;
const cy = () => canvas.height / 2;

// --- Stardust particles ---
const DUST_COUNT = 320;
const dust = [];
for(let i=0;i<DUST_COUNT;i++){
  const angle = Math.random() * Math.PI * 2;
  const rMin = canvas.width * 0.08;
  const rMax = canvas.width * 0.55;
  const r = rMin + Math.random() * (rMax - rMin);
  dust.push({
    angle,
    r,
    size: 0.4 + Math.random() * 1.1,
    opacity: 0.35 + Math.random() * 0.65,
    color: Math.random() < 0.4
      ? `rgba(${Math.floor(180+Math.random()*75)},${Math.floor(120+Math.random()*80)},0,1)`
      : Math.random() < 0.6
        ? `rgba(${Math.floor(140+Math.random()*80)},${Math.floor(100+Math.random()*60)},${Math.floor(180+Math.random()*75)},1)`
        : `rgba(200,200,255,1)`,
    drift: (Math.random() - 0.5) * 0.00008,
    twinkleSpeed: 0.008 + Math.random() * 0.018,
    twinklePhase: Math.random() * Math.PI * 2,
  });
}

// --- Cyan bright stars ---
const CYAN_COUNT = 28;
const cyanStars = [];
for(let i=0;i<CYAN_COUNT;i++){
  const angle = Math.random() * Math.PI * 2;
  const rMin = canvas.width * 0.18;
  const rMax = canvas.width * 0.50;
  const r = rMin + Math.random() * (rMax - rMin);
  cyanStars.push({
    angle,
    r,
    size: 1.2 + Math.random() * 1.6,
    baseOpacity: 0.7 + Math.random() * 0.3,
    twinkleSpeed: 0.006 + Math.random() * 0.014,
    twinklePhase: Math.random() * Math.PI * 2,
    drift: (Math.random() - 0.5) * 0.00006,
  });
}

// --- Drifting nebula wisps (ellipses) ---
const wisps = [
  {x:-0.18,y:-0.12,rx:0.22,ry:0.14,color:'rgba(80,40,140,0.18)',drift:0.00003},
  {x:0.16,y:0.10,rx:0.20,ry:0.12,color:'rgba(60,30,120,0.15)',drift:-0.00004},
  {x:0.06,y:-0.18,rx:0.18,ry:0.10,color:'rgba(0,40,80,0.12)',drift:0.00005},
  {x:-0.08,y:0.15,rx:0.16,ry:0.09,color:'rgba(100,50,30,0.10)',drift:-0.00003},
];
let wispAngle = 0;

let t = 0;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H/2;
  t += 1;

  // nebula wisps — slow drift
  wispAngle += 0.00015;
  wisps.forEach((w,i)=>{
    ctx.save();
    ctx.translate(CX + w.x*W + Math.sin(wispAngle*(i+1)*0.7)*W*0.012,
                  CY + w.y*H + Math.cos(wispAngle*(i+1)*0.5)*H*0.012);
    ctx.scale(1, 0.6);
    const grad = ctx.createRadialGradient(0,0,0,0,0,w.rx*W);
    grad.addColorStop(0, w.color);
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0,0,w.rx*W,w.ry*H,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // stardust
  dust.forEach(p=>{
    p.angle += p.drift;
    const x = CX + Math.cos(p.angle)*p.r*(W/900);
    const y = CY + Math.sin(p.angle)*p.r*(H/600);
    const tw = Math.sin(t*p.twinkleSpeed + p.twinklePhase);
    const op = p.opacity * (0.6 + 0.4*tw);
    ctx.globalAlpha = op;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI*2);
    ctx.fill();
  });

  // cyan stars with 4-ray cross sparkle
  cyanStars.forEach(s=>{
    s.angle += s.drift;
    const x = CX + Math.cos(s.angle)*s.r*(W/900);
    const y = CY + Math.sin(s.angle)*s.r*(H/600);
    const tw = 0.5 + 0.5*Math.sin(t*s.twinkleSpeed + s.twinklePhase);
    const op = s.baseOpacity * tw;
    if(op < 0.05) return;

    // glow halo
    ctx.save();
    const grd = ctx.createRadialGradient(x,y,0,x,y,s.size*5);
    grd.addColorStop(0,`rgba(100,255,220,${op*0.5})`);
    grd.addColorStop(1,'rgba(0,255,200,0)');
    ctx.fillStyle=grd;
    ctx.beginPath();
    ctx.arc(x,y,s.size*5,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // core
    ctx.globalAlpha = op;
    ctx.fillStyle = '#aaffee';
    ctx.beginPath();
    ctx.arc(x,y,s.size,0,Math.PI*2);
    ctx.fill();

    // cross rays
    ctx.globalAlpha = op * 0.7;
    ctx.strokeStyle = '#55ffdd';
    ctx.lineWidth = 0.5;
    const ray = s.size * 5 * tw;
    ctx.beginPath();
    ctx.moveTo(x-ray,y); ctx.lineTo(x+ray,y);
    ctx.moveTo(x,y-ray); ctx.lineTo(x,y+ray);
    ctx.stroke();
  });

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

draw();
</script>
